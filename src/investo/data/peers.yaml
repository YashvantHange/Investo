  # --- appended 2026-07; see the ordering note at the top of this file ---

  # Automotive ER&D is NOT generic IT services: these firms sell engineering hours against OEM
  # R&D budgets, so they track the auto cycle and SDV/EV programme spend, not enterprise IT
  # discretionary spend. The narrative overrides below reframe them accordingly.
  auto_erd:
    label: Automotive ER&D
    outlook: high
    industry_cagr: "~12-15% (SDV, EV & ADAS engineering spend; est.)"
    keywords: [automotive engineering, engineering r&d, embedded software]
    sub_domains:
      - Software-defined vehicles (SDV)
      - ADAS & autonomous driving
      - EV powertrain & battery management
      - Vehicle electronics & middleware
      - Digital cockpit & infotainment
    demand_drivers:
      - OEM transition to software-defined vehicles
      - EV platform re-architecture programmes
      - Rising ADAS content per vehicle
      - OEMs externalising non-differentiating R&D
      - Regulatory safety & emissions mandates
    future_demand: >-
      Structural rather than cyclical: as vehicles become software-defined, OEMs are
      externalising engineering they cannot staff in-house. The risk is programme timing,
      not the direction of travel.
    risks:
      - OEM R&D budget cuts or programme deferrals
      - Client concentration (a few large OEMs)
      - Wage inflation and engineer attrition
      - USD/EUR-INR currency swings
      - Pace of EV adoption slowing
    members: [KPITTECH.NS, TATAELXSI.NS, TATATECH.NS, LTTS.NS, CYIENT.NS]

  auto_components:
