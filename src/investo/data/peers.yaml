# Curated peer groups, India-first (NSE symbols). Extend freely.
#
# Each group: label, outlook (high|medium|low), industry_cagr (display string), members, and
# provenance (version, updated_at, source). A group may also carry `keywords` and narrative
# overrides (sub_domains, demand_drivers, future_demand, risks) — see below.
#
# Matching, in order (see analysis/peers.py::resolve_peer_group):
#   1. exact membership          -> basis "curated"
#   2. `keywords` vs Yahoo's industry/sector, for tickers in no group -> basis "sector-fallback"
# Keep `keywords` NARROW. A loose keyword that drags an unrelated company into a group and then
# reports it at curated-grade confidence is worse than reporting no peers at all.
#
# ORDERING IS SIGNIFICANT: _group_for is first-match-wins over this file's order, and some
# tickers are deliberately double-booked (EICHERMOT.NS in auto_oem + two_wheelers; RELIANCE.NS in
# oil_gas_energy + telecom). The first listed group wins. APPEND new groups at the END — inserting
# near the top silently reframes existing companies. tests/test_peers.py pins this.
#
# industry_cagr values are Investo's own curated estimates, not third-party forecasts; they are
# rendered with their `updated_at` so a reader can judge staleness.

# File-level provenance, merged into every group by data/__init__.py::peer_groups(). A group that
# is revised on its own should override `updated_at` (and bump `version`) locally.
